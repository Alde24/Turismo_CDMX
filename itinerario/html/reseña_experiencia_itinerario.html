<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo 404</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="../../navbar/css/navbar.css">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../css/rese_exp_iti.css">
    <link rel="icon" href="../../inimgs/pest.png" type="image/x-icon">
    <link rel="stylesheet" href="../../swiper/swiper-bundle.min.css">
    <script src="../../swiper/swiper-bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <main>
        <div class="regresar">
            <a class="pink" href="../../index.php">
                <i class="bi bi-arrow-left-circle-fill"></i>
            </a>
        </div>
        <div class="container w-75 mt-4">
            <h2>Crear reseña</h2>
        </div>
        <section class="container w-75 sombra mb-5 mt-4">
            <div class="d-flex justify-content-center container w-100">
                <div class="row w-100">
                    <div class="col-12">
                        <h3>Itinerario</h3>
                        <div class="review-card mb-2 onclick="location.href='itinerario/html/infolugar.html'">
                            <div class="hotel-name">Hotel CasaNova</div>
                            <div class="review-body">Review body</div>
                            <div class="reviewer-info">
                                <img src="../../inimgs/32.png" alt="Reviewer">
                                <div>
                                    <div class="reviewer-name">Reviewer name</div>
                                    <div class="review-date">Date</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <form id="reviewForm">
                        <input type="hidden" name="idFormulario" value="123"> <!-- Sustituye '123' por el valor dinámico -->
                        
                        <!-- Calificación -->
                        <h3>Calificación general</h3>
                        <div class="rating">
                            <input value="5" name="rating" id="star5" type="radio" required>
                            <label for="star5"></label>
                            <input value="4" name="rating" id="star4" type="radio">
                            <label for="star4"></label>
                            <input value="3" name="rating" id="star3" type="radio">
                            <label for="star3"></label>
                            <input value="2" name="rating" id="star2" type="radio">
                            <label for="star2"></label>
                            <input value="1" name="rating" id="star1" type="radio">
                            <label for="star1"></label>
                        </div>
                    
                        <!-- Título -->
                        <h3>Agrega un título</h3>
                        <input class="input w-100" name="titulo" placeholder="¿Qué es lo más importante para compartir?" required>
                    
                        <!-- Comentario -->
                        <h3>Agrega un comentario escrito</h3>
                        <textarea name="comentario" class="input w-100" placeholder="Describe tu experiencia" required></textarea>
                    
                        <!-- Botón de envío -->
                        <div class="btn-rese-enviar">
                            <button type="submit" class="w-50 btn btn-primary">Enviar reseña</button>
                        </div>
                    </form>
                </div>
            </div>    
        </section>
    </main>

    <!-- Modal de éxito -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">¡Reseña enviada!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Tu reseña se ha enviado exitosamente. Gracias por tu aporte.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="../../swiper/swiper-bundle.min.js"></script>
    <script src="/ADS_Turismo404/navbar/js/navbar.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Enviar el formulario con AJAX
        $('#reviewForm').on('submit', function(event) {
            event.preventDefault(); // Evitar recarga de página

            $.ajax({
                url: 'guardar_resena.php',
                method: 'POST',
                data: $(this).serialize(),
                success: function(response) {
                    // Mostrar el modal si el servidor responde correctamente
                    const modal = new bootstrap.Modal(document.getElementById('successModal'));
                    modal.show();
                },
                error: function() {
                    alert('Error al enviar la reseña. Por favor, intenta nuevamente.');
                }
            });
        });
    </script>
</body>
</html>
