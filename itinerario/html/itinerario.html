<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerario - Turismo404</title>
    <link rel="stylesheet" href="../../navbar/css/navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../../inimgs/pest.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/bootstrap.min.css">
    <script src="../../js/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="../css/itinerario.css">

</head>

<body>
    <div id="header"></div>

    <main class="container my-4">
        <!-- Barra de navegación superior -->
        <div class="row">
            <div class="col-lg-11 col-md-11 col-sm-11 col-xs-11 d-flex justify-content-center">
                <button class="tab p-2 selected" onclick="showSection('calendar')" value="Calendario" id="BtnCalen">Calendario</button>
                <button class="tab p-2 ms-2" onclick="showSection('itinerary')" value="Itinerario" id="BtnIti">Itinerario</button>
                <button class="tab p-2 ms-2" onclick="showSection('map')" values="mapa" id="BtnMapa">Mapa</button>
            </div>
            <div class="col-lg-1 col-md-1 col-sm-1 col-xs-1"> 
                <a href="../../index.php">
                    <img src="../../inimgs/salir.png" class="exit-icon" alt="exit">
                </a>
            </div>
        </div>        

        <!-- Sección de calendario -->
        <div id="calendar" class="row section my-4 justify-content-center hidden">
            <h3 class="col-lg-12 my-4">Calendario de actividades</h3>
            <section class="row justify-content-center" id="CardsCalendIti">
                
                
            </section>
            
        </div>
        
        

        <!-- Sección de actividades por día -->
        <div id="itinerary" class="row section my-4">
            <h3 class="col-lg-12 my-4">Itinerario</h3>
            <select id="day-select-Iti" class="col-lg-3 col-md-3 col-sm-3 m-4 p-2">
                <option>Seleccionar día</option>
            </select>
        
            <section id="Cont-Itinerario" class="container">
                <div class="activity-card row m-4">
                    
                </div>
                
            </section>
        </div>

        <!-- Sección de MAPA -->
        <div id="map" class="row section my-4 hidden">
            <h3 class="col-lg-12 my-4">MAPA</h3>
            <select id="day-select-Map"  class="col-lg-3 my-4 ms-4">
                <option>Seleccionar día</option>
                
            </select>
            <img src="../imgs/ruta.png" class="col-lg-1 p-0 m-4 icon" id="icon-route" onclick="toggleIconsAndContent()">
            <img src="../imgs/list.png" class="col-lg-1 p-0 m-4 icon hidden" id="icon-list" onclick="toggleIconsAndContent()">
            <div class="map-group row my-4">
                <div class="col-lg-4 lugares hidden">
                    <div class="ins-card"> 
                        <span>Seleccione un día para ver las actividades programadas y la ruta correspondiente.</span>
                        <img src="/ADS_Turismo404/inimgs/petfeli.png">
                    </div>
                </div>

                <div class="col-lg-4 indicaciones">
                    <div class="ins-card instrucciones" id="instrucciones"> 
                        <span>Seleccione un día para visualizar la ruta y sus indicaciones correspondientes.</span>
                        <img src="/ADS_Turismo404/inimgs/petRuta.png">
                    </div>
                </div>

                <!-- Contenedor del mapa -->
                <section id="day1-map" class="col-lg-8 justify-content-center">
                    <div class="map-container">
                        <div id="mapaAPI"></div> <!-- Contenedor del nuevo mapa -->
                    </div>
                </section>
            </div>   
                
        </div>
        
            <button class="btn btn-secondary">Terminar viaje</button>
            <button class="btn btn-primary w-25 m-3" id="print-pdf" style="display: none;">Guardar itinerario pdf</button>
        </div>
        <br>
        <br>
    </main>
    
    <div id="footer"></div>
     <!-- Cargar la API de Google Maps -->
     <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBlBfvcJxLHgYnFMJBbgLmdzIS_mI2QZZQ&callback=iniciarMapa&v=weekly&libraries=places" async defer></script>

   
    <script src="../js/itinerario.js"></script>
    <script src="../js/GenerarItinerario.js"></script>
    <script src="../../navbar/js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script>
        function showSection(section) {
            // Ocultar todas las secciones
            document.querySelectorAll('.section').forEach(function(sectionElement) {
                sectionElement.classList.add('hidden');
            });
        
            // Mostrar la sección seleccionada
            document.getElementById(section).classList.remove('hidden');
        
            // Mostrar el botón solo si estamos en la sección de itinerario
            if (section === 'itinerary') {
                document.getElementById('print-pdf').style.display = 'inline-block';
            } else {
                document.getElementById('print-pdf').style.display = 'none';
            }
        }
    </script>
</body>
</html>
